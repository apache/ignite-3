name: Build & Test

on:
  push:
    branches: [ ignite-di-claude ]
  pull_request:
    branches: [ ignite-di-claude ]
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Build (skip tests and checks)
        run: ./gradlew clean build -x assembleDist -x distTar -x distZip -x check

  checks:
    name: Checkstyle, PMD, SpotBugs
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: true

      - name: Run Checkstyle
        run: ./gradlew checkstyleMain checkstyleTest checkstyleIntegrationTest checkstyleTestFixtures

      - name: Run PMD
        if: success() || failure()
        run: ./gradlew pmdMain pmdTest pmdIntegrationTest pmdTestFixtures

      - name: Run SpotBugs
        if: success() || failure()
        run: ./gradlew spotbugsMain spotbugsTest spotbugsIntegrationTest spotbugsTestFixtures

  unit-tests:
    name: Unit Tests
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: true

      - name: Run unit tests
        run: ./gradlew test

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          retention-days: 7
          path: '**/build/reports/tests/test/'

  integration-tests:
    name: Integration Tests
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: true

      - name: Run integration tests
        run: ./gradlew integrationTest

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-reports
          retention-days: 7
          path: '**/build/reports/tests/integrationTest/'
